<div class="auth-wrapper">
  <div class="auth-card">
    
    <header class="auth-header">
      <h2 class="title">NUEVA CONTRASEÑA</h2>
      <p class="subtitle">Ingresa tus nuevas credenciales de acceso.</p>
    </header>

    <div *ngIf="message" class="alert-banner" [ngClass]="{'error': isError, 'success': !isError}">
      {{ message }}
    </div>

    <form class="auth-form" (ngSubmit)="handleUpdatePassword()">
      
      <div class="input-group">
        <label for="password">Nueva Contraseña</label>
        <div class="password-wrapper" style="position: relative; display: flex;">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            placeholder="Mínimo 8 caracteres" 
            [disabled]="isLoading" 
            style="width: 100%;"
            required>
            
          <button 
            type="button" 
            (click)="togglePasswordVisibility()" 
            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; display: flex; align-items: center; justify-content: center; padding: 0;">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <ul style="margin-top: 8px; padding-left: 20px; color: #999; font-size: 0.75rem; line-height: 1.4;">
          <li>Mínimo 8 caracteres</li>
          <li>Mayúscula, minúscula, número y símbolo</li>
        </ul>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirmar Nueva Contraseña</label>
        <div class="password-wrapper" style="position: relative; display: flex;">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            placeholder="Repite tu nueva contraseña" 
            [disabled]="isLoading" 
            style="width: 100%;"
            required>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading || !password || !confirmPassword">
        {{ isLoading ? 'ACTUALIZANDO...' : 'GUARDAR CONTRASEÑA' }}
      </button>

    </form>
  </div>
</div>
